<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>員工基本資料卡</title>
    <!-- 載入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 載入 React 與 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 載入 Babel 以便在瀏覽器中編譯 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 建立簡易 Icon 元件取代 Lucide-react 以確保單一檔案可運行
        const Icons = {
            User: () => <svg className="w-5 h-5 mr-2 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>,
            Phone: () => <svg className="w-5 h-5 mr-2 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>,
            BookOpen: () => <svg className="w-5 h-5 mr-2 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>,
            Briefcase: () => <svg className="w-5 h-5 mr-2 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>,
            FileText: () => <svg className="w-5 h-5 mr-2 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>,
            Shield: () => <svg className="w-5 h-5 mr-2 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>,
            Save: () => <svg className="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>,
            Download: () => <svg className="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>,
            RefreshCw: () => <svg className="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
        };

        const App = () => {
          const initialState = {
            fillDate: '', name: '', idNumber: '', birthDate: '', gender: '',
            transportation: '', phone: '', mobile: '', email: '',
            contactAddress: '', registeredAddress: '',
            emergContact: '', emergRelation: '', emergPhone: '', emergMobile: '',
            eduSchool: '', eduDept: '', eduStart: '', eduEnd: '', eduStatus: '',
            work1Company: '', work1Title: '', work1Desc: '', work1Years: '',
            work2Company: '', work2Title: '', work2Desc: '', work2Years: '',
            langMandarin: '', langTaiwanese: '', langHakka: '', langEnglish: '', langJapanese: '', langOther: '',
            submitDocs: '',
            hrEmpId: '', hrTitle: '', hrDept: '', hrStartDate: '',
            hrLaborDate: '', hrGroupDate: '', hrBaseSalary: '', hrOtherSalary: '', hrNotes: ''
          };

          const [formData, setFormData] = useState(initialState);
          const [toastMessage, setToastMessage] = useState('');

          const showToast = (message) => {
            setToastMessage(message);
            setTimeout(() => setToastMessage(''), 3000);
          };

          const handleChange = (e) => {
            const { name, value } = e.target;
            setFormData(prev => ({ ...prev, [name]: value }));
          };

          const handleSaveDraft = () => {
            localStorage.setItem('employeeFormData', JSON.stringify(formData));
            showToast('資料已暫存於瀏覽器');
          };

          const handleLoadDraft = () => {
            const saved = localStorage.getItem('employeeFormData');
            if (saved) {
              setFormData(JSON.parse(saved));
              showToast('已載入暫存資料');
            } else {
              showToast('沒有找到暫存資料');
            }
          };

          const handleClear = () => {
            if (window.confirm('確定要清空所有欄位嗎？')) {
              setFormData(initialState);
              localStorage.removeItem('employeeFormData');
              showToast('資料已清空');
            }
          };

          const exportToExcel = () => {
            const tableHtml = `
              <html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">
              <head>
                <meta charset="UTF-8">
                <style>
                  table { border-collapse: collapse; width: 100%; font-family: "微軟正黑體", sans-serif; }
                  td, th { border: 1px solid black; padding: 8px; text-align: left; }
                  .header { background-color: #f2f2f2; font-weight: bold; text-align: center; }
                  .section-title { background-color: #d9d9d9; font-weight: bold; }
                </style>
              </head>
              <body>
                <table>
                  <tr><td colspan="6" style="text-align: right;">填寫日期*：${formData.fillDate}</td></tr>
                  <tr>
                    <td class="header">姓名*</td><td colspan="2">${formData.name}</td>
                    <td class="header">身份證字號*</td><td colspan="2">${formData.idNumber}</td>
                  </tr>
                  <tr>
                    <td class="header">出生日期*</td><td colspan="2">${formData.birthDate}</td>
                    <td class="header">性別*</td><td colspan="2">${formData.gender}</td>
                  </tr>
                  <tr><td class="header">交通工具</td><td colspan="5">${formData.transportation}</td></tr>
                  <tr>
                    <td class="header">聯絡電話*</td><td colspan="2">${formData.phone}</td>
                    <td class="header">行動電話*</td><td colspan="2">${formData.mobile}</td>
                  </tr>
                  <tr><td class="header">電子郵件*</td><td colspan="5">${formData.email}</td></tr>
                  <tr><td class="header">聯絡地址*</td><td colspan="5">${formData.contactAddress}</td></tr>
                  <tr><td class="header">戶籍地址</td><td colspan="5">${formData.registeredAddress}</td></tr>
                  <tr>
                    <td class="header">緊急聯絡人</td><td>${formData.emergContact}</td>
                    <td class="header">關係</td><td colspan="3">${formData.emergRelation}</td>
                  </tr>
                  <tr>
                    <td class="header">聯絡電話</td><td colspan="2">${formData.emergPhone}</td>
                    <td class="header">行動電話</td><td colspan="2">${formData.emergMobile}</td>
                  </tr>
                  <tr><td colspan="6" class="section-title">最高學歷</td></tr>
                  <tr>
                    <td class="header">學校名稱</td><td class="header">科系</td><td class="header">入校年份</td>
                    <td class="header">離校年份</td><td colspan="2" class="header">畢肄業</td>
                  </tr>
                  <tr>
                    <td>${formData.eduSchool}</td><td>${formData.eduDept}</td><td>${formData.eduStart}</td>
                    <td>${formData.eduEnd}</td><td colspan="2">${formData.eduStatus}</td>
                  </tr>
                  <tr><td colspan="6" class="section-title">到職前二份工作經歷</td></tr>
                  <tr>
                    <td colspan="2" class="header">服務單位</td><td class="header">職稱</td>
                    <td colspan="2" class="header">工作說明</td><td class="header">年資</td>
                  </tr>
                  <tr>
                    <td colspan="2">${formData.work1Company}</td><td>${formData.work1Title}</td>
                    <td colspan="2">${formData.work1Desc}</td><td>${formData.work1Years}</td>
                  </tr>
                  <tr>
                    <td colspan="2">${formData.work2Company}</td><td>${formData.work2Title}</td>
                    <td colspan="2">${formData.work2Desc}</td><td>${formData.work2Years}</td>
                  </tr>
                  <tr><td colspan="6" class="section-title">語言能力</td></tr>
                  <tr>
                    <td class="header">國語</td><td class="header">台語</td><td class="header">客語</td>
                    <td class="header">英文</td><td class="header">日文</td><td class="header">其他</td>
                  </tr>
                  <tr>
                    <td>${formData.langMandarin}</td><td>${formData.langTaiwanese}</td><td>${formData.langHakka}</td>
                    <td>${formData.langEnglish}</td><td>${formData.langJapanese}</td><td>${formData.langOther}</td>
                  </tr>
                  <tr><td class="header">繳交資料</td><td colspan="5">${formData.submitDocs}</td></tr>
                  <tr><td colspan="6" class="section-title">人事單位填寫資料</td></tr>
                  <tr>
                    <td class="header">員工編號*</td><td colspan="2">${formData.hrEmpId}</td>
                    <td class="header">職稱*</td><td colspan="2">${formData.hrTitle}</td>
                  </tr>
                  <tr>
                    <td class="header">所屬部門*</td><td colspan="2">${formData.hrDept}</td>
                    <td class="header">到職日*</td><td colspan="2">${formData.hrStartDate}</td>
                  </tr>
                  <tr>
                    <td class="header">勞健保加保日</td><td colspan="2">${formData.hrLaborDate}</td>
                    <td class="header">團保加保日</td><td colspan="2">${formData.hrGroupDate}</td>
                  </tr>
                  <tr>
                    <td class="header">基本薪資*</td><td colspan="2">${formData.hrBaseSalary}</td>
                    <td class="header">其他薪資</td><td colspan="2">${formData.hrOtherSalary}</td>
                  </tr>
                  <tr><td class="header">備註</td><td colspan="5">${formData.hrNotes}</td></tr>
                </table>
              </body>
              </html>
            `;
            const blob = new Blob([tableHtml], { type: 'application/vnd.ms-excel' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `員工基本資料卡_${formData.name || '未命名'}.xls`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('已匯出 Excel 檔案');
          };

          const InputField = ({ label, name, type = 'text', required = false, width = 'w-full' }) => (
            <div className={`flex flex-col mb-4 ${width} px-2`}>
              <label className="mb-1 text-sm font-semibold text-gray-700">
                {label} {required && <span className="text-red-500">*</span>}
              </label>
              <input
                type={type} name={name} value={formData[name]} onChange={handleChange} required={required}
                className="px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
              />
            </div>
          );

          const SectionHeader = ({ iconName, title }) => {
              const IconComp = Icons[iconName];
              return (
                <div className="flex items-center mt-8 mb-4 border-b-2 border-gray-200 pb-2">
                  <IconComp />
                  <h2 className="text-xl font-bold text-gray-800">{title}</h2>
                </div>
              );
          };

          return (
            <div className="min-h-screen py-8 px-4 sm:px-6 lg:px-8">
              {toastMessage && (
                <div className="fixed top-5 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-lg z-50 transition-opacity duration-300">
                  {toastMessage}
                </div>
              )}

              <div className="max-w-5xl mx-auto bg-white rounded-xl shadow-md overflow-hidden">
                <div className="bg-blue-700 px-6 py-6 flex flex-col sm:flex-row justify-between items-center">
                  <h1 className="text-2xl font-bold text-white mb-4 sm:mb-0">員工基本資料卡</h1>
                  <div className="flex space-x-2">
                    <button onClick={handleLoadDraft} className="flex items-center bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-md transition text-sm">
                      <Icons.RefreshCw /> 載入暫存
                    </button>
                    <button onClick={handleSaveDraft} className="flex items-center bg-green-600 hover:bg-green-500 text-white px-4 py-2 rounded-md transition text-sm">
                      <Icons.Save /> 暫存資料
                    </button>
                    <button onClick={exportToExcel} className="flex items-center bg-yellow-500 hover:bg-yellow-400 text-white px-4 py-2 rounded-md transition text-sm">
                      <Icons.Download /> 匯出表格
                    </button>
                  </div>
                </div>

                <div className="p-6 sm:p-8">
                  <form onSubmit={(e) => e.preventDefault()}>
                    <div className="flex flex-wrap -mx-2 mb-4 justify-end">
                       <InputField label="填寫日期" name="fillDate" type="date" required width="w-full sm:w-1/3" />
                    </div>

                    <SectionHeader iconName="User" title="基本資料" />
                    <div className="flex flex-wrap -mx-2">
                      <InputField label="姓名" name="name" required width="w-full sm:w-1/2 md:w-1/4" />
                      <InputField label="身份證字號" name="idNumber" required width="w-full sm:w-1/2 md:w-1/4" />
                      <InputField label="出生日期" name="birthDate" type="date" required width="w-full sm:w-1/2 md:w-1/4" />
                      <div className="flex flex-col mb-4 w-full sm:w-1/2 md:w-1/4 px-2">
                        <label className="mb-1 text-sm font-semibold text-gray-700">性別 <span className="text-red-500">*</span></label>
                        <select name="gender" value={formData.gender} onChange={handleChange} className="px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                          <option value="">請選擇</option>
                          <option value="男">男</option>
                          <option value="女">女</option>
                        </select>
                      </div>
                    </div>
                    
                    <div className="flex flex-wrap -mx-2">
                      <InputField label="交通工具" name="transportation" width="w-full sm:w-1/3" />
                      <InputField label="聯絡電話" name="phone" required width="w-full sm:w-1/3" />
                      <InputField label="行動電話" name="mobile" required width="w-full sm:w-1/3" />
                    </div>

                    <div className="flex flex-wrap -mx-2">
                      <InputField label="電子郵件" name="email" type="email" required width="w-full" />
                      <InputField label="聯絡地址" name="contactAddress" required width="w-full" />
                      <InputField label="戶籍地址" name="registeredAddress" width="w-full" />
                    </div>

                    <SectionHeader iconName="Phone" title="緊急聯絡人" />
                    <div className="flex flex-wrap -mx-2">
                      <InputField label="緊急聯絡人" name="emergContact" width="w-full sm:w-1/4" />
                      <InputField label="關係" name="emergRelation" width="w-full sm:w-1/4" />
                      <InputField label="聯絡電話" name="emergPhone" width="w-full sm:w-1/4" />
                      <InputField label="行動電話" name="emergMobile" width="w-full sm:w-1/4" />
                    </div>

                    <SectionHeader iconName="BookOpen" title="最高學歷" />
                    <div className="flex flex-wrap -mx-2">
                      <InputField label="學校名稱" name="eduSchool" width="w-full sm:w-1/5" />
                      <InputField label="科系" name="eduDept" width="w-full sm:w-1/5" />
                      <InputField label="入校年份" name="eduStart" width="w-full sm:w-1/5" />
                      <InputField label="離校年份" name="eduEnd" width="w-full sm:w-1/5" />
                      <div className="flex flex-col mb-4 w-full sm:w-1/5 px-2">
                        <label className="mb-1 text-sm font-semibold text-gray-700">畢肄業</label>
                        <select name="eduStatus" value={formData.eduStatus} onChange={handleChange} className="px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                          <option value="">請選擇</option>
                          <option value="畢業">畢業</option>
                          <option value="肄業">肄業</option>
                          <option value="在學">在學</option>
                        </select>
                      </div>
                    </div>

                    <SectionHeader iconName="Briefcase" title="到職前二份工作經歷" />
                    <div className="bg-gray-100 p-4 rounded-lg mb-4">
                      <h3 className="text-sm font-bold text-gray-600 mb-2">經歷一</h3>
                      <div className="flex flex-wrap -mx-2">
                        <InputField label="服務單位" name="work1Company" width="w-full sm:w-1/4" />
                        <InputField label="職稱" name="work1Title" width="w-full sm:w-1/4" />
                        <InputField label="工作說明" name="work1Desc" width="w-full sm:w-2/4" />
                        <InputField label="年資" name="work1Years" width="w-full sm:w-1/4" />
                      </div>
                    </div>
                    <div className="bg-gray-100 p-4 rounded-lg">
                      <h3 className="text-sm font-bold text-gray-600 mb-2">經歷二</h3>
                      <div className="flex flex-wrap -mx-2">
                        <InputField label="服務單位" name="work2Company" width="w-full sm:w-1/4" />
                        <InputField label="職稱" name="work2Title" width="w-full sm:w-1/4" />
                        <InputField label="工作說明" name="work2Desc" width="w-full sm:w-2/4" />
                        <InputField label="年資" name="work2Years" width="w-full sm:w-1/4" />
                      </div>
                    </div>

                    <SectionHeader iconName="FileText" title="語言能力 (填寫精通/中等/略懂/無)" />
                    <div className="flex flex-wrap -mx-2">
                      <InputField label="國語" name="langMandarin" width="w-full sm:w-1/6" />
                      <InputField label="台語" name="langTaiwanese" width="w-full sm:w-1/6" />
                      <InputField label="客語" name="langHakka" width="w-full sm:w-1/6" />
                      <InputField label="英文" name="langEnglish" width="w-full sm:w-1/6" />
                      <InputField label="日文" name="langJapanese" width="w-full sm:w-1/6" />
                      <InputField label="其他" name="langOther" width="w-full sm:w-1/6" />
                    </div>

                    <SectionHeader iconName="FileText" title="繳交資料" />
                    <div className="flex flex-wrap -mx-2">
                      <div className="flex flex-col mb-4 w-full px-2">
                        <textarea
                          name="submitDocs" value={formData.submitDocs} onChange={handleChange} rows="3"
                          className="px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                          placeholder="請填寫已繳交之文件（如：身份證影本、大頭照、存摺影本等）"
                        />
                      </div>
                    </div>

                    <div className="mt-10 p-6 bg-red-50 border border-red-200 rounded-xl">
                      <SectionHeader iconName="Shield" title="人事單位填寫資料 (由 HR 填寫)" />
                      <div className="flex flex-wrap -mx-2">
                        <InputField label="員工編號" name="hrEmpId" required width="w-full sm:w-1/4" />
                        <InputField label="職稱" name="hrTitle" required width="w-full sm:w-1/4" />
                        <InputField label="所屬部門" name="hrDept" required width="w-full sm:w-1/4" />
                        <InputField label="到職日" name="hrStartDate" type="date" required width="w-full sm:w-1/4" />
                      </div>
                      <div className="flex flex-wrap -mx-2">
                        <InputField label="勞健保加保日" name="hrLaborDate" type="date" width="w-full sm:w-1/4" />
                        <InputField label="團保加保日" name="hrGroupDate" type="date" width="w-full sm:w-1/4" />
                        <InputField label="基本薪資" name="hrBaseSalary" required width="w-full sm:w-1/4" />
                        <InputField label="其他薪資" name="hrOtherSalary" width="w-full sm:w-1/4" />
                      </div>
                      <div className="flex flex-wrap -mx-2">
                        <InputField label="備註" name="hrNotes" width="w-full" />
                      </div>
                    </div>

                    <div className="mt-8 pt-6 border-t border-gray-200 flex justify-end space-x-4">
                      <button type="button" onClick={handleClear} className="px-6 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50 transition">
                        清空表單
                      </button>
                      <button type="button" onClick={exportToExcel} className="px-8 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 shadow-md transition font-bold flex items-center">
                        <Icons.Download /> 完成並匯出 Excel 表格
                      </button>
                    </div>
                  </form>
                </div>
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
